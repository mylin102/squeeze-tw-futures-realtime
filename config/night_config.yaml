execution:
  broker_fee_per_side: 20.0
  exchange_fee_per_side: 0.0
  initial_balance: 100000
  limit_offset_pts: 2.0
  market_slippage_pts: 3.0
  order_type: range_market
  range_protection_pts: 5.0
  tax_rate: 2.0e-05
  tick_size: 1.0
live_trading: true
monitoring:
  callback:
    buffer_size: 100
    health_check_secs: 60
    use_tick_data: false
  data_mode: hybrid
  pb_confirmation_bars: 12
  poll_interval_secs: 30
risk_mgmt:
  break_even_pts: 50
  exit_on_vwap: false
  ma_stop:
    length: 20
    multiplier: 1.0
    ticks: 15
    type: below
  stop_loss_pts: 60
  time_filter:
    enabled: true
    max_holding_mins: 120
    skip_hours: []
  trailing_stop:
    distance_pts: 30
    enabled: true
    trigger_pts: 60
strategy:
  entry_score: 20
  length: 20
  partial_exit:
    enabled: true
    tp1_lots: 1
    tp1_pts: 50
  pullback:
    buffer: 1.002
    ema_fast: 20
    ema_slow: 60
    lookback: 60
  tsm_confirmation: false
  tsm_correlation_threshold: 0.7
  tsm_min_confidence: 0.5
  tsm_timeframe: 15m
  weights:
    15m: 0.5
    1h: 0.3
    5m: 0.2
trade_mgmt:
  allow_long: true
  allow_short: true
  force_close_at_end: true
  lots_per_trade: 1
  max_positions: 1
tsm_config:
  check_correlation: false
  enabled: false
  interval: 5m
  min_confidence: 0.5
  period: 5d
  ticker: TSM
