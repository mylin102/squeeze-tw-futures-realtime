# 🌙 夜盤交易策略配置
# 特點：
# - 參考 TSM (台積電 ADR) 走勢
# - 放寬停損 (夜盤波動大)
# - 時間過濾 (避開美股開盤高波動)

# 實戰總開關
live_trading: false

# 1. 策略核心參數 (夜盤版)
strategy:
  length: 20
  entry_score: 40            # 夜盤適中門檻
  use_squeeze: true
  use_pullback: true
  regime_filter: "loose"     # 夜盤放寬趨勢過濾
  
  # TSM 確認參數
  tsm_confirmation: true     # 啟用 TSM 確認
  tsm_min_confidence: 0.6    # TSM 最低信心度
  tsm_correlation_threshold: 0.7  # 最低相關性門檻

  pullback:
    ema_fast: 20
    ema_slow: 60
    lookback: 60
    buffer: 1.002

  # 分批停利策略 (夜盤版)
  partial_exit:
    enabled: true
    tp1_pts: 60              # 夜盤目標更大
    tp1_lots: 1

  weights:
    "1h": 0.2
    "15m": 0.4
    "5m": 0.4

# 2. 部位管理
trade_mgmt:
  lots_per_trade: 1          # 夜盤減碼
  max_positions: 2
  allow_long: true
  allow_short: true
  force_close_at_end: true   # 夜盤強制收盤

# 3. 風險控管 (夜盤版)
risk_mgmt:
  # MA 動態停損 (夜盤放寬)
  ma_stop_type: "below"
  ma_stop_length: 20
  ma_stop_ticks: 15          # 夜盤從 10 提高至 15
  ma_stop_multiplier: 1.0

  # 固定停損 (夜盤放寬)
  stop_loss_pts: 80          # 夜盤從 50 提高至 80
  break_even_pts: 50         # 夜盤提高
  exit_on_vwap: false        # 禁用 VWAP

  # 移動停損
  trailing_stop_enabled: true
  trailing_stop_trigger_pts: 50    # 夜盤提高
  trailing_stop_distance_pts: 25   # 夜盤提高

  # 時間過濾 (夜盤專屬)
  time_filter_enabled: true
  skip_hours: []             # 夜盤不跳過
  max_holding_time_mins: 120 # 夜盤最長持倉 2 小時

# 4. TSM 數據配置
tsm_config:
  enabled: true
  ticker: "TSM"
  period: "5d"
  interval: "5m"
  min_confidence: 0.6        # 最低信心度
  check_correlation: true    # 檢查相關性

# 5. 回測執行與交易成本模型
execution:
  order_type: "market"
  tick_size: 1.0
  market_slippage_pts: 2.0   # 夜盤滑價較大
  limit_offset_pts: 2.0
  range_protection_pts: 5.0
  broker_fee_per_side: 20.0
  exchange_fee_per_side: 0.0
  tax_rate: 0.00002
  initial_balance: 100000

# 6. 實時監控與輪詢設定
monitoring:
  data_mode: "hybrid"
  poll_interval_secs: 60     # 夜盤放慢輪詢
  pb_confirmation_bars: 12
  
  callback:
    use_tick_data: false
    buffer_size: 100
    health_check_secs: 60
