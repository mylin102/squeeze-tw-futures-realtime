# 🚀 Squeeze Taiwan Futures Auto-Trader Configuration

# 實戰總開關
live_trading: false

# 1. 策略核心參數
strategy:
  length: 20
  entry_score: 70
  use_squeeze: true
  use_pullback: true
  regime_filter: "mid"
  
  pullback:
    ema_fast: 20
    ema_slow: 60
    lookback: 60
    buffer: 1.002

  # 🚀 新增：分批停利策略 (Partial Exit)
  partial_exit:
    enabled: true      # 是否啟動分批停利
    tp1_pts: 40        # 第一階段停利點數 (40 點)
    tp1_lots: 1        # 第一階段平倉口數

  weights:
    "1h": 0.2
    "15m": 0.4
    "5m": 0.4

# 2. 部位管理
trade_mgmt:
  lots_per_trade: 2    # 進場直接 2 口
  max_positions: 2
  allow_long: true
  allow_short: true
  force_close_at_end: false

# 3. 風險控管
risk_mgmt:
  stop_loss_pts: 30
  break_even_pts: 30
  exit_on_vwap: true

# 4. 回測執行與交易成本模型
execution:
  order_type: "market"        # market | limit | range_market
  tick_size: 1.0
  market_slippage_pts: 1.0
  limit_offset_pts: 2.0
  range_protection_pts: 3.0
  broker_fee_per_side: 20.0   # 依券商實際手續費調整
  exchange_fee_per_side: 0.0  # 若已含在券商手續費，可維持 0
  tax_rate: 0.00002           # 台灣股價指數期貨稅率，TMF 使用此假設
